<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nuestro Aniversario ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
      text-align: center;
      color: white;
    }

    h1 {
      margin-top: 40px;
      font-size: 3em;
    }

    p {
      font-size: 1.3em;
      margin: 20px;
    }

    .galeria {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin: 30px;
    }

    .galeria img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 15px;
      transition: transform 0.3s;
    }

    .galeria img:hover {
      transform: scale(1.1);
    }

    .frase {
      margin: 30px;
      font-style: italic;
      font-size: 1.5em;
    }

    footer {
      margin: 40px;
      font-size: 1em;
    }
  </style>
</head>
<body>

  <h1>Feliz Aniversario ❤️</h1>

  <p>
    Desde que llegaste a mi vida, todo cambió para mejor.  
    Gracias por cada momento, cada sonrisa y cada recuerdo juntos.
  </p>

  <div class="galeria">
    <img src="foto1.jpg" alt="">
    <img src="foto2.jpg" alt="">
    <img src="foto3.jpg" alt="">
  </div>

  <div class="frase">
    "Contigo entendí lo que significa amar de verdad."
  </div>

  <div class="frase">
    "Eres mi lugar favorito en todo el mundo."
  </div>

  <footer>
    Te amo muchísimo ❤️
  </footer>

</body>
</html>
